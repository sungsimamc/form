<script>
/* utils.js 인라인 */
/**
 * VetForm — utils.js
 * 공통 유틸리티: sessionStorage 관리, Slack 용어 변환, 라우팅 헬퍼
 */


// ============================================================
// 1. sessionStorage 헬퍼
// ============================================================

const VF_PREFIX = 'vetform_';

const Storage = {
  /** 섹션 데이터 저장 */
  set(section, data) {
    try {
      sessionStorage.setItem(VF_PREFIX + section, JSON.stringify(data));
    } catch (e) {
      console.warn('[VetForm] sessionStorage 저장 실패, localStorage 폴백:', e);
      try { localStorage.setItem(VF_PREFIX + section, JSON.stringify(data)); } catch (_) {}
    }
  },

  /** 섹션 데이터 불러오기 */
  get(section) {
    try {
      const v = sessionStorage.getItem(VF_PREFIX + section);
      return v ? JSON.parse(v) : null;
    } catch (e) {
      try {
        const v = localStorage.getItem(VF_PREFIX + section);
        return v ? JSON.parse(v) : null;
      } catch (_) { return null; }
    }
  },

  /** 전체 VetForm 데이터 병합하여 반환 */
  getAll() {
    const result = {};
    const keys = [
      'signalment', 'chief_complaint', 'systems_review',
      'history', 'prevention', 'diet_env', 'memo',
      'branch_vomiting', 'branch_diarrhea', 'branch_anorexia',
      'branch_lethargy', 'branch_dyspnea', 'branch_cough',
      'branch_urinary', 'branch_lameness', 'branch_skin',
      'branch_ear', 'branch_eye', 'branch_abdomen',
      'branch_seizure', 'branch_syncope', 'branch_dental',
      'branch_nasal'
    ];
    keys.forEach(k => {
      const v = this.get(k);
      if (v) result[k] = v;
    });
    return result;
  },

  /** 임시저장 (제출 실패 시) */
  saveTemp(data) {
    try {
      localStorage.setItem(VF_PREFIX + 'temp_submission', JSON.stringify({
        data,
        savedAt: new Date().toISOString()
      }));
    } catch (e) {}
  },

  /** 임시저장 불러오기 */
  getTemp() {
    try {
      const v = localStorage.getItem(VF_PREFIX + 'temp_submission');
      return v ? JSON.parse(v) : null;
    } catch (e) { return null; }
  },

  /** 임시저장 삭제 */
  clearTemp() {
    try { localStorage.removeItem(VF_PREFIX + 'temp_submission'); } catch (e) {}
  },

  /** 전체 초기화 */
  clearAll() {
    try {
      Object.keys(sessionStorage)
        .filter(k => k.startsWith(VF_PREFIX))
        .forEach(k => sessionStorage.removeItem(k));
    } catch (e) {}
  }
};

// ============================================================
// 2. Branch 라우팅
// ============================================================

/** 계통 리뷰 선택 → branch 파일명 매핑 */
const BRANCH_MAP = {
  'anorexia':  { file: 'anorexia.html',  label: '식욕부진',     emoji: '🍽️' },
  'vomiting':  { file: 'vomiting.html',  label: '구토',         emoji: '🤢' },
  'diarrhea':  { file: 'diarrhea.html',  label: '설사',         emoji: '💩' },
  'urinary':   { file: 'urinary.html',   label: '배뇨 이상',    emoji: '🐾' },
  'dyspnea':   { file: 'dyspnea.html',   label: '호흡곤란',     emoji: '😮‍💨' },
  'lameness':  { file: 'lameness.html',  label: '파행',         emoji: '🦵' },
  'lethargy':  { file: 'lethargy.html',  label: '기력저하',     emoji: '😴' },
  'seizure':   { file: 'seizure.html',   label: '발작',         emoji: '🧠' },
  'syncope':   { file: 'syncope.html',   label: '기절',         emoji: '😵' },
  'abdomen':   { file: 'abdomen.html',   label: '복부 팽만',    emoji: '🫃' },
  'skin':      { file: 'skin.html',      label: '피부 이상',    emoji: '🔴' },
  'ear':       { file: 'ear.html',       label: '귀 이상',      emoji: '👂' },
  'eye':       { file: 'eye.html',       label: '눈 이상',      emoji: '👁️' },
  'cough':     { file: 'cough.html',     label: '기침',         emoji: '😮' },
  'dental':    { file: 'dental.html',    label: '구강·치과 이상',emoji: '🦷' },
  'nasal':     { file: 'nasal.html',     label: '콧물·재채기',  emoji: '🤧' },
};

const Router = {
  /**
   * 선택된 branch 목록 저장
   * @param {string[]} branchKeys - BRANCH_MAP의 키 배열
   */
  setBranches(branchKeys) {
    Storage.set('routing', {
      branches: branchKeys,
      completed: [],
      currentIndex: 0
    });
  },

  /** 현재 라우팅 상태 */
  getRouting() {
    return Storage.get('routing') || { branches: [], completed: [], currentIndex: 0 };
  },

  /** branch 완료 처리 후 다음으로 이동 */
  completeCurrent() {
    const routing = this.getRouting();
    const current = routing.branches[routing.currentIndex];
    if (current && !routing.completed.includes(current)) {
      routing.completed.push(current);
    }
    routing.currentIndex += 1;
    Storage.set('routing', routing);

    if (routing.currentIndex < routing.branches.length) {
      const next = routing.branches[routing.currentIndex];
      const info = BRANCH_MAP[next];
      if (info) {
        window.location.href = '../branches/' + info.file;
      }
    } else {
      window.location.href = '../confirm.html';
    }
  },

  /** branch 건너뛰기 */
  skipCurrent() {
    this.completeCurrent(); // 완료 없이 index만 올림
  },

  /** 추가 branch 동적 삽입 (동반 증상에서 추천) */
  addBranchIfMissing(branchKey) {
    const routing = this.getRouting();
    if (!routing.branches.includes(branchKey) && !routing.completed.includes(branchKey)) {
      // 현재 이후에 삽입
      routing.branches.splice(routing.currentIndex + 1, 0, branchKey);
      Storage.set('routing', routing);
      return true;
    }
    return false;
  },

  /** 진행률 (0~1) */
  getProgress() {
    const routing = this.getRouting();
    const total = routing.branches.length;
    if (total === 0) return 1;
    return routing.completed.length / total;
  },

  /** 현재 branch key */
  getCurrentKey() {
    const routing = this.getRouting();
    return routing.branches[routing.currentIndex] || null;
  }
};

/**
 * 보호자 표현을 임상 용어로 변환
 * @param {string} text - 원본 텍스트
 * @returns {string} 변환된 텍스트 (매핑 없으면 원본 반환)
 */
function toClinicTerm(text) {
  if (!text) return text;
  let result = text;
  Object.entries(TERM_MAP).forEach(([kor, eng]) => {
    if (result.includes(kor)) {
      result = result.replace(kor, `${kor}(${eng})`);
    }
  });
  return result;
}

// ============================================================
// 4. Slack 메시지 빌더
// ============================================================

function buildSlackMessage(allData) {
  const { signalment: s, chief_complaint: cc, systems_review: sr, history: h,
          prevention: pv, diet_env: de, memo } = allData;

  const lines = [];

  // 헤더
  lines.push('🐾 *신규 문진 접수*');
  lines.push('─'.repeat(28));

  // Signalment
  if (s) {
    const sex = s.sex ? (s.sex === '수컷' ? 'M' : 'F') : '';
    const neuter = s.neutered === '했음' ? 'N' : s.neutered === '안 함' ? 'I' : '';
    const age = s.age ? `${s.age}${s.age_unit === '개월' ? 'mo' : 'y'}` : '';
    const sexStr = [sex, neuter].filter(Boolean).join('/');
    lines.push(`*환자명:* ${s.name || '-'}  (${[sexStr, age, s.breed].filter(Boolean).join(', ')})`);
    lines.push(`*보호자:* ${s.owner_name || '-'}`);
    if (s.weight) lines.push(`*체중:* ${s.weight} kg`);
  }

  // Chief Complaint
  if (cc) {
    lines.push('');
    lines.push(`*주호소:* ${cc.reason || '-'}`);
    const duration = cc.since ? `(${cc.since})` : '';
    const severity = cc.severity || '';
    const course = cc.course || '';
    lines.push(`*경과:* ${[duration, course, severity].filter(Boolean).join(' · ')}`);
    if (cc.recurrence === '재발' && cc.recurrence_when) {
      lines.push(`*재발:* ${cc.recurrence_when}`);
    }
  }

  // Systems Review — 선택된 증상
  if (sr && sr.selected && sr.selected.length > 0) {
    lines.push('');
    const labels = sr.selected.map(k => BRANCH_MAP[k] ? BRANCH_MAP[k].label : k);
    lines.push(`*계통 리뷰:* ${labels.join(', ')}`);
  }

  // Branch 데이터
  const branchKeys = Object.keys(allData).filter(k => k.startsWith('branch_'));
  branchKeys.forEach(key => {
    const branchKey = key.replace('branch_', '');
    const info = BRANCH_MAP[branchKey];
    const data = allData[key];
    if (!data || !info) return;

    lines.push('');
    lines.push(`*[${info.label}]*`);
    formatBranchForSlack(branchKey, data, lines);
  });

  // 과거력
  if (h) {
    lines.push('');
    lines.push('*[과거력 / 투약]*');
    if (h.conditions) lines.push(`• 기저질환: ${h.conditions}`);
    if (h.surgeries)  lines.push(`• 수술이력: ${h.surgeries}`);
    if (h.medications)lines.push(`• 투약: ${h.medications}`);
    if (h.allergies)  lines.push(`• 알레르기: ${h.allergies}`);
  }

  // 예방
  if (pv) {
    const pvItems = [];
    if (pv.vaccine)   pvItems.push(`백신 ${pv.vaccine}`);
    if (pv.heartworm) pvItems.push(`심장사상충 ${pv.heartworm}`);
    if (pv.parasite)  pvItems.push(`외부기생충 ${pv.parasite}`);
    if (pvItems.length) lines.push(`*예방:* ${pvItems.join(' / ')}`);
  }

  // 식이·환경
  if (de) {
    const deItems = [];
    if (de.diet)       deItems.push(`식이 ${de.diet}`);
    if (de.living)     deItems.push(de.living);
    if (de.housemates) deItems.push(`동거동물 ${de.housemates}`);
    if (de.env_change) deItems.push(`환경변화 있음`);
    if (deItems.length) lines.push(`*환경:* ${deItems.join(' / ')}`);
  }

  // 추가 메모
  if (memo && memo.text) {
    lines.push('');
    lines.push(`*보호자 추가 메모:* ${memo.text}`);
  }

  lines.push('');
  lines.push(`_문진 시각: ${new Date().toLocaleString('ko-KR')}_`);

  return lines.join('\n');
}

/**
 * Branch 데이터를 Slack 포맷으로 변환
 * 각 branch는 key-value 객체이며, 임상 용어로 변환하여 출력
 */
function formatBranchForSlack(branchKey, data, lines) {
  // 공통: 주요 필드 순서대로 출력
  Object.entries(data).forEach(([key, value]) => {
    if (!value || key === 'notes') return;
    if (Array.isArray(value)) {
      const converted = value.map(v => toClinicTerm(v)).join(', ');
      lines.push(`• ${fieldLabel(key)}: ${converted}`);
    } else if (typeof value === 'string' && value !== '없음' && value !== '정상') {
      lines.push(`• ${fieldLabel(key)}: ${toClinicTerm(value)}`);
    }
  });
  if (data.notes) {
    lines.push(`• 추가: ${data.notes}`);
  }
}

/** 내부 필드명 → 한국어 레이블 */
function fieldLabel(key) {
  const map = {
    since: '언제부터', frequency: '빈도', pattern: '패턴',
    content: '내용물', blood: '혈액', severity: '중증도',
    appetite: '식욕', water: '음수', energy: '기력',
    foreign_body: '이물섭취', toxin: '독성물질', notes: '추가',
    stool_consistency: '변굳기', stool_color: '변색깔',
    mucus: '점액', hematochezia: '혈변',
    location: '부위', characteristics: '병변양상', pruritus: '소양감',
    odor: '냄새', side: '어느쪽', discharge_color: '분비물색깔',
    onset: '발생계기', limb: '어느다리', wbc: '방광',
    urine_color: '소변색깔', dysuria: '배뇨시통증',
    duration: '지속시간', postictal: '발작후 상태', aura: '전구증상',
    collapse_type: '쓰러질때모습', recovery: '회복시간',
  };
  return map[key] || key;
}

// ============================================================
// 5. Google Sheets 행 빌더
// ============================================================

function buildSheetsRow(allData) {
  const s = allData.signalment || {};
  const cc = allData.chief_complaint || {};
  const sr = allData.systems_review || {};

  const selectedBranches = (sr.selected || [])
    .map(k => BRANCH_MAP[k]?.label || k)
    .join(', ');

  return {
    timestamp:      new Date().toISOString(),
    patient_name:   s.name || '',
    owner_name:     s.owner_name || '',
    species:        s.species || '',
    breed:          s.breed || '',
    age:            s.age ? `${s.age}${s.age_unit}` : '',
    sex:            s.sex || '',
    neutered:       s.neutered || '',
    weight:         s.weight || '',
    chief_complaint:cc.reason || '',
    duration:       cc.since || '',
    systems:        selectedBranches,
    conditions:     (allData.history || {}).conditions || '',
    medications:    (allData.history || {}).medications || '',
    raw_json:       JSON.stringify(allData)
  };
}

// ============================================================
// 6. 제출 (Cloudflare Workers 경유)
// ============================================================

/**
 * Workers URL — 배포 후 실제 URL로 교체
 * 개발 중에는 이 값을 직접 수정하거나 config 파일로 분리 가능
 */
const WORKERS_URL = 'https://hist-relay.simpson9713.workers.dev';

/**
 * 문진 데이터 제출 (재시도 3회)
 * @param {object} allData
 * @returns {Promise<{ok: boolean, error?: string}>}
 */
async function submitForm(allData) {
  const slackText  = buildSlackMessage(allData);
  const sheetsRow  = buildSheetsRow(allData);
  const payload    = { slack: slackText, sheets: sheetsRow };

  let lastError = null;
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      const res = await fetch(WORKERS_URL + '/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        Storage.clearTemp();
        return { ok: true };
      }
      lastError = `HTTP ${res.status}`;
    } catch (e) {
      lastError = e.message;
    }
    if (attempt < 3) await sleep(attempt * 1200);
  }

  // 3회 실패 → 로컬 임시저장
  Storage.saveTemp(allData);
  return { ok: false, error: lastError };
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ============================================================
// 7. UI 헬퍼
// ============================================================

/**
 * 즉시 내원 알림 표시
 * @param {HTMLElement} container - 알림을 삽입할 부모 엘리먼트
 * @param {string} message
 */
function showUrgentAlert(container, message) {
  // 중복 방지
  if (container.querySelector('.vf-alert-urgent')) return;
  const el = document.createElement('div');
  el.className = 'vf-alert-urgent';
  el.innerHTML = `
    <span class="vf-alert-urgent__icon">🚨</span>
    <span class="vf-alert-urgent__text">${message}</span>
  `;
  container.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/**
 * Accordion 열기/닫기
 * @param {HTMLElement} accordion
 * @param {boolean} open
 */
function toggleAccordion(accordion, open) {
  if (open) {
    accordion.classList.add('open');
    accordion.removeAttribute('hidden');
  } else {
    accordion.classList.remove('open');
  }
}

/**
 * 칩 버튼 단일 선택 처리
 * @param {NodeList|HTMLElement[]} chips
 * @param {function} onChange - (selectedValue) => void
 */
function initSingleSelect(chips, onChange) {
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      onChange(chip.dataset.value);
    });
  });
}

/**
 * 칩 버튼 다중 선택 처리
 * @param {NodeList|HTMLElement[]} chips
 * @param {function} onChange - (selectedValues[]) => void
 */
function initMultiSelect(chips, onChange) {
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      const selected = [...chips]
        .filter(c => c.classList.contains('selected'))
        .map(c => c.dataset.value);
      onChange(selected);
    });
  });
}

/**
 * 진행 바 업데이트
 * @param {number} percent - 0~100
 */
function updateProgressBar(percent) {
  const bar = document.querySelector('.vf-progress__bar');
  if (bar) bar.style.width = percent + '%';
}

// ============================================================
// Export (모듈 사용 시) / 전역 노출 (스크립트 직접 사용)
// ============================================================

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    Storage, Router, BRANCH_MAP, TERM_MAP,
    toClinicTerm, buildSlackMessage, buildSheetsRow, submitForm,
    showUrgentAlert, toggleAccordion, initSingleSelect, initMultiSelect,
    updateProgressBar
  };
} else {
  // 브라우저 전역
  window.VF = {
    Storage, Router, BRANCH_MAP, TERM_MAP,
    toClinicTerm, buildSlackMessage, buildSheetsRow, submitForm,
    showUrgentAlert, toggleAccordion, initSingleSelect, initMultiSelect,
    updateProgressBar
  };
}

</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const state = {};
  const multiState = {};
  const ACCORDION_RULES = {};

  Object.assign(ACCORDION_RULES, {
    new_food: { acc: 'acc-food', trigger: '있음' },
    mass:     { acc: 'acc-mass', trigger: '있음' },
  });
  function collectTextFields(data) {
    data.food_detail = document.getElementById('f-food-detail') ? document.getElementById('f-food-detail').value.trim() : '';
    data.mass_detail = document.getElementById('f-mass-detail') ? document.getElementById('f-mass-detail').value.trim() : '';
  }
  function handleSideEffect(group, value) {
    if (group === 'ear_problem' && value === '있음') Router.addBranchIfMissing('ear');
  }

  document.querySelectorAll('.vf-chip[data-group]').forEach(chip => {
    chip.addEventListener('click', function() {
      const group = this.dataset.group;
      document.querySelectorAll(`.vf-chip[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
      state[group] = this.dataset.value;
      const rule = ACCORDION_RULES[group];
      if (rule) toggleAccordion(document.getElementById(rule.acc), this.dataset.value === rule.trigger);
      handleSideEffect(group, this.dataset.value);
    });
  });
  document.querySelectorAll('.vf-chip[data-multi]').forEach(chip => {
    chip.addEventListener('click', function() {
      this.classList.toggle('selected');
      const key = this.dataset.multi;
      const val = this.dataset.value;
      if (!multiState[key]) multiState[key] = [];
      if (this.classList.contains('selected')) { if (!multiState[key].includes(val)) multiState[key].push(val); }
      else { multiState[key] = multiState[key].filter(v => v !== val); }
    });
  });
  function handleNext() {
    const data = Object.assign({}, state);
    Object.keys(multiState).forEach(k => { data[k] = multiState[k]; });
    data.notes = document.getElementById('f-notes').value.trim();
    collectTextFields(data);
    Storage.set('branch_skin', data);
    Router.completeCurrent();
  }
  window.handleNext = handleNext;
  updateProgressBar(Math.round(Router.getProgress() * 100));
});
</script>
